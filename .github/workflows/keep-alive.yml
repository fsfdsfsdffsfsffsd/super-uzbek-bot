name: Keep Render bot awake

# Render bepul tarifi 15 daqiqa harakatsizlikdan keyin botni uxlatadi.
# Bu workflow har 10 daqiqada bot manziliga ping yuborib, uni uyg'oq tutadi.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:        # Qo'lda ham ishga tushirish mumkin

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping bot
        env:
          AVTOELON_SYNC_TOKEN: ${{ secrets.AVTOELON_SYNC_TOKEN }}
        run: |
          echo "Ping yuborilmoqda: $(date -u)"
          curl -sS -m 60 https://super-uzbek-bot.onrender.com/ || true
          curl -sS -m 60 https://super-uzbek-bot-1.onrender.com/ || true
          if [ -n "$AVTOELON_SYNC_TOKEN" ]; then
            curl -sS -m 60 "https://super-uzbek-bot-1.onrender.com/sync?token=${AVTOELON_SYNC_TOKEN}" || true
          else
            echo "AVTOELON_SYNC_TOKEN secret topilmadi; faqat wake ping yuborildi."
          fi
          echo ""
          echo "Tayyor."
