services:
  - type: web
    name: avtoelon-userbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python userbot.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SOURCE_CHANNEL
        sync: false
      - key: DEST_CHANNEL
        sync: false
      - key: TELETHON_SESSION
        sync: false
      - key: NEW_LINK
        value: https://t.me/AvtoMashinaBozorElonlar
      - key: CATCHUP_LIMIT
        value: 50
      - key: DEST_SCAN_LIMIT
        value: 1500
      - key: CATCHUP_INTERVAL_SECONDS
        value: 300
      - key: PYTHON_VERSION
        value: 3.12.7
